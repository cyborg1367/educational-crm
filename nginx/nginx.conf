# Upstream addresses are resolved through Docker's embedded DNS at request
# time (resolver + variables), not once at nginx startup. Without this,
# rebuilding a service gives its container a new IP and nginx keeps proxying
# to the dead one until restarted -> 502 Bad Gateway.
server {
  listen 80;

  resolver 127.0.0.11 valid=10s ipv6=off;

  set $api_upstream http://api:8000;
  set $frontend_upstream http://frontend:3000;

  # Backend API — strip the /api prefix before proxying.
  # (proxy_pass with a variable does no URI mapping, so rewrite explicitly.)
  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Backend Swagger docs (same path upstream, no rewrite needed)
  location /docs {
    proxy_pass $api_upstream;
  }

  location /openapi.json {
    proxy_pass $api_upstream;
  }

  location /redoc {
    proxy_pass $api_upstream;
  }

  # Frontend (everything else)
  location / {
    proxy_pass $frontend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
